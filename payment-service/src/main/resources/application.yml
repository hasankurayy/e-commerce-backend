server:
  port: 8085

spring:
  application:
    name: payment-service
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_URI:localhost:8888}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: false
    hostname: localhost

iyzico:
  api-key: ${IYZICO_API_KEY:sandbox-api-key}
  secret-key: ${IYZICO_SECRET_KEY:sandbox-secret-key}
  base-url: ${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}
