version: '3.9'

# Kullanmadan önce: DOCKERHUB_USERNAME değişkenini .env dosyasına yaz
# Örnek .env:
#   DOCKERHUB_USERNAME=seninkiadın
#   IYZICO_API_KEY=sandbox-79J39ggYDjlvWyib5Nyleyo8bTqJsDPA
#   IYZICO_SECRET_KEY=sandbox-DKTW3UZZoLkUPPa2GQyvXMiPB3zc4Iod
#   APP_FRONTEND_URL=https://senin-vercel-url.vercel.app

services:

  # ─── Altyapı ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-alpine
    container_name: ecommerce-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── Spring Cloud ──────────────────────────────────────────────────────────

  config-server:
    image: ${DOCKERHUB_USERNAME}/n55-config-server:latest
    container_name: ecommerce-config-server
    restart: unless-stopped
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  eureka-server:
    image: ${DOCKERHUB_USERNAME}/n55-eureka-server:latest
    container_name: ecommerce-eureka-server
    restart: unless-stopped
    depends_on:
      config-server:
        condition: service_healthy
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/n55-api-gateway:latest
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URI=config-server:8888
      - EUREKA_SERVER_URI=http://eureka-server:8761/eureka
      - REDIS_HOST=redis
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - ecommerce-net

  # ─── İş Servisleri ─────────────────────────────────────────────────────────

  user-service:
    image: ${DOCKERHUB_USERNAME}/n55-user-service:latest
    container_name: ecommerce-user-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URI=config-server:8888
      - EUREKA_SERVER_URI=http://eureka-server:8761/eureka
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - ecommerce-net

  product-service:
    image: ${DOCKERHUB_USERNAME}/n55-product-service:latest
    container_name: ecommerce-product-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URI=config-server:8888
      - EUREKA_SERVER_URI=http://eureka-server:8761/eureka
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - ecommerce-net

  cart-service:
    image: ${DOCKERHUB_USERNAME}/n55-cart-service:latest
    container_name: ecommerce-cart-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URI=config-server:8888
      - EUREKA_SERVER_URI=http://eureka-server:8761/eureka
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - ecommerce-net

  order-service:
    image: ${DOCKERHUB_USERNAME}/n55-order-service:latest
    container_name: ecommerce-order-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URI=config-server:8888
      - EUREKA_SERVER_URI=http://eureka-server:8761/eureka
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - ecommerce-net

  payment-service:
    image: ${DOCKERHUB_USERNAME}/n55-payment-service:latest
    container_name: ecommerce-payment-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URI=config-server:8888
      - EUREKA_SERVER_URI=http://eureka-server:8761/eureka
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
      - RABBITMQ_HOST=rabbitmq
      - IYZICO_API_KEY=${IYZICO_API_KEY}
      - IYZICO_SECRET_KEY=${IYZICO_SECRET_KEY}
      - APP_CALLBACK_URL=http://${ORACLE_IP}:8080/api/payments/callback
      - APP_FRONTEND_URL=${APP_FRONTEND_URL}
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - ecommerce-net

  notification-service:
    image: ${DOCKERHUB_USERNAME}/n55-notification-service:latest
    container_name: ecommerce-notification-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      - CONFIG_SERVER_URI=config-server:8888
      - EUREKA_SERVER_URI=http://eureka-server:8761/eureka
      - DB_HOST=postgres
      - DB_USER=postgres
      - DB_PASS=postgres
      - RABBITMQ_HOST=rabbitmq
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
    networks:
      - ecommerce-net

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  ecommerce-net:
    driver: bridge
