name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ecommerce_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build parent POM
        run: mvn install -N -B

      - name: Build and test common-lib
        run: mvn install -f common-lib/pom.xml -B

      - name: Build and test all services
        run: |
          for service in config-server eureka-server api-gateway user-service product-service cart-service order-service payment-service notification-service; do
            echo "=== Building $service ==="
            mvn verify -f $service/pom.xml -B
          done
        env:
          SPRING_PROFILES_ACTIVE: test
