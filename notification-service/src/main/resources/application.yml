server:
  port: 8086

spring:
  application:
    name: notification-service
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_URI:localhost:8888}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: false
    hostname: localhost
