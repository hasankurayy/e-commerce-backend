server:
  port: 8082

spring:
  application:
    name: product-service
  config:
    import: "optional:configserver:http://${CONFIG_SERVER_URI:localhost:8888}"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URI:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: false
    hostname: localhost

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
